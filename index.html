<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance v2.2 - Admin Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-bright: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.35);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.25);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.25);
            --warning: #f59e0b;
            --dark-base: #090d16;
            --glass-card: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { 
            box-sizing: border-box;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #090d16 100%);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background: rgba(9, 13, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        header h1 i {
            color: var(--primary-bright);
            filter: drop-shadow(0 0 8px var(--primary));
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 460px;
            gap: 30px;
            padding: 40px;
            max-width: 1650px;
            margin: auto;
        }

        .card {
            background: var(--glass-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        /* Video / HUD Cyber Style */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/3;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .hud-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* HUD Corners */
        .video-container::before, .video-container::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: var(--primary-bright);
            border-style: solid;
            z-index: 12;
            opacity: 0.85;
            pointer-events: none;
        }
        .video-container::before {
            top: 20px; left: 20px;
            border-width: 3px 0 0 3px;
        }
        .video-container::after {
            bottom: 20px; right: 20px;
            border-width: 0 3px 3px 0;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; }

        /* Status Badge */
        .status-badge { 
            padding: 8px 18px; 
            border-radius: 30px; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px; 
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .status-ready { 
            background: var(--success-glow); 
            color: #34d399; 
            border: 1px solid rgba(16, 185, 129, 0.4);
            text-shadow: 0 0 4px var(--success);
        }
        .status-wait { 
            background: rgba(245, 158, 11, 0.15); 
            color: #fbbf24; 
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        /* Displays Labels */
        #displayName { 
            font-size: 2.4rem; 
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, var(--primary-bright), #f43f5e); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 8px 0;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }

        /* Tables & Scrollbar */
        .scroll-list {
            max-height: 280px;
            overflow-y: auto;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scroll-list::-webkit-scrollbar { width: 6px; }
        .scroll-list::-webkit-scrollbar-track { background: transparent; }
        .scroll-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .scroll-list::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        tr { background: rgba(30, 41, 59, 0.4); border-radius: 12px; }
        tr:hover { background: rgba(255, 255, 255, 0.05); }
        td, th { padding: 14px 16px; text-align: left; font-size: 0.9rem; color: var(--text-main); }
        th { font-weight: 500; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
        
        /* UI Elements */
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-bright);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); 
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.1);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-del {
            color: #fda4af;
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            width: auto;
            box-shadow: none;
        }
        .btn-del:hover { background: var(--danger); color: white; border-color: transparent; box-shadow: 0 4px 12px var(--danger-glow); }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        h3 {
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h3 i { color: var(--primary-bright); }

        @media (max-width: 1150px) { 
            .container { grid-template-columns: 1fr; padding: 20px; } 
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-face-recognition"></i> ระบบสแกนหน้านักเรียนโรงเรียนโคราชพิทยาคม</h1>
</header>

<div class="container">
    <div class="left-panel">
        <div class="card">
            <div id="statusLabel" class="status-badge status-wait">
                <i class="fas fa-sync fa-spin"></i> LOADING AI SYSTEM...
            </div>
            
            <div class="video-container">
                <div class="hud-overlay"></div>
                <video id="video" autoplay muted></video>
                <canvas id="overlay"></canvas>
            </div>
            
            <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.15); padding: 20px; border-radius: 18px; border: 1px solid var(--glass-border);">
                <div>
                    <small style="color: var(--text-muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">LAST RECOGNIZED:</small>
                    <h2 id="displayName">WAITING...</h2>
                    <p id="displayTime" style="margin:5px 0 0 0; color: var(--primary-bright); font-weight: 500; font-size: 0.95rem;">Please scan your face</p>
                </div>
                <div id="logCount" style="text-align:center; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--glass-border); color:white; padding: 14px 22px; border-radius: 16px; min-width: 100px;">
                    <span style="font-size: 1.8rem; color: var(--success); font-weight: 700; display:block; line-height: 1.1;">0</span>
                    <small style="color: var(--text-muted); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px;">TOTAL LOGS</small>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card" id="loginCard">
            <h3 style="margin-top:0"><i class="fas fa-shield-halved"></i> Admin Control</h3>
            <input type="password" id="passInput" placeholder="Enter Admin Password">
            <button class="btn-primary" onclick="adminAuth()">LOG IN AS ADMIN</button>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="card" style="border-left: 4px solid var(--primary);">
                <h3 style="margin-top:0"><i class="fas fa-user-plus"></i> Register New User</h3>
                <input id="regName" placeholder="Full Name">
                <input id="regId" placeholder="Student ID">
                <input id="regClass" placeholder="Class / Group">
                <button class="btn-primary" onclick="registerFace()">
                    <i class="fas fa-camera"></i> Scan & Save Profile
                </button>
            </div>

            <div class="card" style="border-left: 4px solid var(--success);">
                <h3 style="margin-top:0"><i class="fas fa-database"></i> Database (Registered)</h3>
                <div class="scroll-list">
                    <table>
                        <thead style="position: sticky; top: 0; background: #131c2e; z-index: 1;">
                            <tr>
                                <th>Name</th>
                                <th>ID/Class</th>
                                <th style="text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="registeredList"></tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="border-left: 4px solid var(--danger);">
                <h3 style="margin-top:0;"><i class="fas fa-sliders"></i> Data Management</h3>
                <div style="display: flex; gap: 10px; flex-direction: column;">
                    <button onclick="clearAttendanceHistory()" style="background: rgba(244, 63, 94, 0.15); color: #fda4af; border: 1px solid rgba(244, 63, 94, 0.3);">
                        <i class="fas fa-clock-rotate-left"></i> ล้างประวัติเข้าเรียนทั้งหมด
                    </button>
                    <button onclick="clearRegisteredFaces()" style="background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3);">
                        <i class="fas fa-users-slash"></i> ล้างรายชื่อนักเรียนทั้งหมด
                    </button>
                </div>
            </div>

            <button onclick="logout()" style="background:none; color: var(--danger); font-size: 0.9rem; margin-bottom: 25px; box-shadow: none; border: 1px solid rgba(244, 63, 94, 0.2); background: rgba(244, 63, 94, 0.05);">
                <i class="fas fa-sign-out-alt"></i> Logout Admin Mode
            </button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0"><i class="fas fa-clock-rotate-left"></i> Today's Attendance</h3>
                <button id="exportBtn" class="btn-primary" style="width:auto; padding: 6px 14px; font-size: 0.8rem; border-radius: 8px;" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
            </div>
            <div class="scroll-list">
                <table>
                    <tbody id="attendanceList"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASS = "admin1234";
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    const LATE_TIME = "08:00";
    const COOLDOWN = 10000;

    let faceMatcher = null;
    let attendanceData = JSON.parse(localStorage.getItem('att_history')) || [];
    let registeredFaces = JSON.parse(localStorage.getItem('att_faces')) || [];
    let isScanning = false;

    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');

    async function init() {
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            updateStatus("SYSTEM READY", "status-ready");
            startVideo();
            refreshAttendanceTable();
            refreshRegisteredList(); 
            updateFaceMatcher();
        } catch (err) {
            updateStatus("AI ERROR", "status-wait");
        }
    }

    async function startVideo() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            video.onplaying = () => {
                const displaySize = { width: video.videoWidth, height: video.videoHeight };
                faceapi.matchDimensions(canvas, displaySize);
                setInterval(runScanner, 200);
            };
        } catch (e) { alert("Camera Denied"); }
    }

    async function runScanner() {
        if (!faceMatcher || isScanning) return;
        isScanning = true;

        try {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                .withFaceLandmarks()
                .withFaceDescriptors();

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const resized = faceapi.resizeResults(detections, { width: video.videoWidth, height: video.videoHeight });

            resized.forEach(det => {
                const result = faceMatcher.findBestMatch(det.descriptor);
                if (result.label !== 'unknown' && result.distance < 0.45) {
                    new faceapi.draw.DrawBox(det.detection.box, { 
                        label: result.label.split('|')[0], 
                        boxColor: '#6366f1' 
                    }).draw(canvas);
                    processAttendance(result.label);
                }
            });
        } catch (error) {
            console.error("Scanner error:", error);
        } finally {
            isScanning = false;
        }
    }

    function processAttendance(label) {
        const [name, id, room] = label.split('|');
        const now = new Date();
        const dateStr = now.toLocaleDateString('th-TH');
        const timeStr = now.toLocaleTimeString('th-TH', { hour12: false });
        
        const lastLog = attendanceData.find(a => a.id === id && a.date === dateStr);
        if (lastLog) {
            const [lH, lM, lS] = lastLog.time.split(':');
            const lTime = new Date(); lTime.setHours(lH, lM, lS);
            if (now - lTime < COOLDOWN) return;
        }

        const status = timeStr > LATE_TIME ? "LATE" : "ON TIME";
        const entry = { name, id, room, date: dateStr, time: timeStr, status: status };
        attendanceData.unshift(entry);
        localStorage.setItem('att_history', JSON.stringify(attendanceData));
        
        document.getElementById('displayName').innerText = name;
        document.getElementById('displayTime').innerHTML = `<i class="fas fa-circle-check" style="color:var(--success)"></i> CHECKED IN AT ${timeStr}`;
        refreshAttendanceTable();
        playNotification(name, status);
    }

    function playNotification(studentName, status) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(987.77, audioCtx.currentTime + 0.08);
            gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.12);

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                // ตรวจสอบสถานะเพื่อประมวลผลข้อความเสียงภาษาไทย
                const statusSpeech = status === "LATE" ? "มาสายครับ" : "มาทันเวลาครับ";
                const utterance = new SpeechSynthesisUtterance(`${studentName} ${statusSpeech}`);
                utterance.lang = 'th-TH';
                const voices = window.speechSynthesis.getVoices();
                const thaiVoice = voices.find(v => v.lang === 'th-TH' || v.lang.includes('th'));
                if (thaiVoice) utterance.voice = thaiVoice;
                utterance.rate = 1.15;
                utterance.pitch = 1.25;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error("Audio error:", error);
        }
    }

    function refreshRegisteredList() {
        const tbody = document.getElementById('registeredList');
        tbody.innerHTML = registeredFaces.map((f, index) => {
            const [name, id, room] = f.label.split('|');
            return `
                <tr>
                    <td><strong style="color:#fff">${name}</strong></td>
                    <td style="color:var(--text-muted)">${id} <br><small style="color:var(--primary-bright)">ห้อง ${room}</small></td>
                    <td style="text-align: center;">
                        <button class="btn-del" onclick="deleteFace(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function deleteFace(index) {
        if (confirm("Delete this profile?")) {
            registeredFaces.splice(index, 1);
            localStorage.setItem('att_faces', JSON.stringify(registeredFaces));
            refreshRegisteredList();
            updateFaceMatcher();
        }
    }

    async function registerFace() {
        const name = document.getElementById('regName').value;
        const id = document.getElementById('regId').value;
        const room = document.getElementById('regClass').value || '-';
        if (!name || !id) return alert("Fill Name and ID");

        updateStatus("CAPTURING FACE...", "status-wait");
        const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })).withFaceLandmarks().withFaceDescriptor();
        
        if (det) {
            registeredFaces.push({ label: `${name}|${id}|${room}`, descriptor: Array.from(det.descriptor) });
            localStorage.setItem('att_faces', JSON.stringify(registeredFaces));
            updateFaceMatcher();
            refreshRegisteredList(); 
            alert("Registered Successfully!");
            document.getElementById('regName').value = "";
            document.getElementById('regId').value = "";
            document.getElementById('regClass').value = "";
        } else { alert("Face not found! Try again."); }
        updateStatus("SYSTEM READY", "status-ready");
    }

    function adminAuth() {
        if (document.getElementById('passInput').value === ADMIN_PASS) {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            refreshRegisteredList();
        } else { alert("Wrong Password"); }
    }

    function logout() {
        document.getElementById('loginCard').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('passInput').value = "";
    }

    function updateFaceMatcher() {
        if (registeredFaces.length === 0) { faceMatcher = null; return; }
        const labeled = registeredFaces.map(f => new faceapi.LabeledFaceDescriptors(f.label, [new Float32Array(f.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.5);
    }

    function refreshAttendanceTable() {
        const tbody = document.getElementById('attendanceList');
        const today = new Date().toLocaleDateString('th-TH');
        const logs = attendanceData.filter(a => a.date === today);
        document.querySelector('#logCount span').innerText = logs.length;
        tbody.innerHTML = logs.map(a => {
            const statusStyle = a.status === 'LATE' ? 'background:rgba(244,63,94,0.15); color:#fda4af;' : 'background:rgba(16,185,129,0.15); color:#34d399;';
            return `
                <tr>
                    <td><strong style="color:#fff">${a.name}</strong><br><small style="color:var(--text-muted)">ID: ${a.id}</small></td>
                    <td style="font-weight:500; color:#e2e8f0"><i class="far fa-clock" style="color:var(--text-muted); margin-right:5px;"></i>${a.time}</td>
                    <td><span class="status-pill" style="${statusStyle}">${a.status}</span></td>
                </tr>
            `;
        }).join('');
    }

    /* ฟังก์ชันแอดมิน: ล้างข้อมูลประวัติลงเวลาเรียน */
    function clearAttendanceHistory() {
        if (confirm("⚠️ คุณแน่ใจใช่ไหมที่จะลบ 'ประวัติการเข้าเรียนทั้งหมด' ? ข้อมูลนี้จะไม่สามารถกู้คืนได้")) {
            attendanceData = [];
            localStorage.setItem('att_history', JSON.stringify([]));
            refreshAttendanceTable();
            alert("ล้างประวัติการเข้าเรียนเรียบร้อยแล้ว");
        }
    }

    /* ฟังก์ชันแอดมิน: ล้างข้อมูลใบหน้าที่ลงทะเบียนไว้ */
    function clearRegisteredFaces() {
        if (confirm("🚨 คำเตือนขั้นสูง! คุณต้องการลบ 'รายชื่อนักเรียนและฐานข้อมูลใบหน้าทั้งหมด' ใช่หรือไม่? นักเรียนจะไม่สามารถสแกนหน้าได้จนกว่าจะลงทะเบียนใหม่")) {
            registeredFaces = [];
            localStorage.setItem('att_faces', JSON.stringify([]));
            refreshRegisteredList();
            updateFaceMatcher();
            alert("ล้างฐานข้อมูลนักเรียนเรียบร้อยแล้ว");
        }
    }

    function exportCSV() {
        let csv = "\uFEFFName,ID,Room,Date,Time,Status\n";
        attendanceData.forEach(r => csv += `${r.name},${r.id},${r.room},${r.date},${r.time},${r.status}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `report_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function updateStatus(text, className) {
        const el = document.getElementById('statusLabel');
        el.innerHTML = `<i class="fas fa-circle-info"></i> ${text}`;
        el.className = `status-badge ${className}`;
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    init();
</script>
</body>
</html>
